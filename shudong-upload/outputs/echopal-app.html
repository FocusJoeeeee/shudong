<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EchoPal 产品界面</title>
  <style>
    :root {
      --ink: #25211e;
      --muted: #756a60;
      --paper: #fff8ed;
      --line: rgba(54, 43, 34, .16);
      --green: #24463d;
      --green-2: #587a6b;
      --rose: #bf6f67;
      --gold: #c89a45;
      --bg: #efe2d2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 82% 14%, rgba(191, 111, 103, .16), transparent 28%),
        radial-gradient(circle at 10% 84%, rgba(88, 122, 107, .16), transparent 30%),
        var(--bg);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      color: #fff;
      background: var(--green);
    }

    a {
      color: var(--green);
      font-weight: 800;
      text-decoration: none;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr);
      gap: 18px;
    }

    .panel,
    .workspace {
      border: 1px solid rgba(255, 248, 237, .62);
      border-radius: 26px;
      background: rgba(255, 248, 237, .78);
      box-shadow: 0 26px 70px rgba(55, 43, 33, .13);
      backdrop-filter: blur(18px);
    }

    .panel {
      padding: 22px;
      align-self: start;
    }

    .streak {
      margin: 0 0 6px;
      font-size: 46px;
      line-height: 1;
    }

    .muted {
      color: var(--muted);
      line-height: 1.55;
    }

    .primary,
    .soft-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
    }

    .primary {
      color: #fff;
      background: var(--green);
      box-shadow: 0 16px 34px rgba(36, 70, 61, .22);
    }

    .soft-button {
      color: var(--ink);
      border: 1px solid var(--line);
      background: rgba(255, 248, 237, .78);
    }

    .check-card {
      margin-top: 22px;
      perspective: 900px;
    }

    .check-button {
      position: relative;
      width: 100%;
      min-height: 118px;
      border-radius: 24px;
      color: #fff;
      background: transparent;
      transform-style: preserve-3d;
      transition: transform .72s cubic-bezier(.2, .8, .2, 1), opacity .55s ease, translate .55s ease;
    }

    .check-button.done {
      transform: rotateY(180deg);
    }

    .check-button.fading {
      opacity: 0;
      translate: 0 -14px;
      pointer-events: none;
    }

    .check-face {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      border-radius: inherit;
      backface-visibility: hidden;
      background: var(--green);
      box-shadow: 0 18px 36px rgba(36, 70, 61, .22);
      font-size: 24px;
      font-weight: 900;
    }

    .check-back {
      background: var(--rose);
      transform: rotateY(180deg);
    }

    .workspace {
      padding: 22px;
      overflow: hidden;
    }

    .workspace-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
    }

    .workspace-head h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.12;
    }

    .setup-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 18px;
    }

    .setup-row input {
      min-width: 0;
      min-height: 46px;
      padding: 0 15px;
      border: 1px solid var(--line);
      border-radius: 999px;
      outline: 0;
      background: #fffaf2;
    }

    .tasks {
      display: grid;
      gap: 12px;
      min-height: 178px;
      margin-bottom: 22px;
    }

    .task {
      position: relative;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, .58);
      opacity: 0;
      transform: translateY(18px);
      transition: opacity .5s ease, transform .5s ease;
      overflow: visible;
    }

    .task.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .task input {
      width: 20px;
      height: 20px;
      accent-color: var(--green);
    }

    .task.shatter {
      animation: taskOut .52s ease forwards;
    }

    .particle {
      position: absolute;
      left: 24px;
      top: 50%;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      pointer-events: none;
      animation: burst .72s ease-out forwards;
    }

    .diary {
      display: grid;
      gap: 12px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .diary h2 {
      margin: 0;
      font-size: 28px;
    }

    textarea {
      width: 100%;
      min-height: 190px;
      padding: 18px 20px 22px;
      border: 1px solid var(--line);
      border-radius: 22px;
      outline: 0;
      resize: vertical;
      color: var(--ink);
      background:
        repeating-linear-gradient(
          transparent 0 42px,
          rgba(78, 113, 140, .16) 42px 43px,
          transparent 43px 44px
        ),
        #fffaf2;
      background-position: 0 18px;
      font-size: 19px;
      line-height: 44px;
    }

    .encourage {
      min-height: 54px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(36, 70, 61, .1);
      color: var(--green);
      font-weight: 900;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .45s ease, transform .45s ease;
    }

    .encourage.show {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes taskOut {
      to {
        opacity: 0;
        transform: scale(.94) translateY(-8px);
        filter: blur(2px);
      }
    }

    @keyframes burst {
      to {
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(.2);
      }
    }

    @media (max-width: 900px) {
      .app-shell {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .shell {
        width: min(100% - 20px, 1080px);
        padding: 18px 0;
      }

      .topbar,
      .workspace-head {
        display: grid;
      }

      .setup-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand"><span class="mark">E</span>EchoPal</div>
      <a href="echopal-diary.html">返回介绍页</a>
    </header>

    <div class="app-shell">
      <aside class="panel">
        <p class="muted">你的连续记录</p>
        <h2 class="streak"><span id="streakCount">0</span> 天</h2>
        <p class="muted" id="streakText">今天还没有打卡。</p>
        <div class="check-card">
          <button class="check-button" id="checkButton">
            <span class="check-face">今日打卡</span>
            <span class="check-face check-back">已完成</span>
          </button>
        </div>
      </aside>

      <main class="workspace">
        <div class="workspace-head">
          <div>
            <h1>今天要完成什么？</h1>
            <p class="muted">先设定每天想做的小事。完成打卡后，它们会依次出现。</p>
          </div>
          <button class="soft-button" id="resetDemo">重置演示</button>
        </div>

        <div class="setup-row">
          <input id="taskInput" placeholder="例如：读 10 页书 / 散步 20 分钟 / 记录一个灵感">
          <button class="primary" id="addTask">添加事项</button>
        </div>

        <div class="tasks" id="tasks"></div>

        <div class="diary">
          <div>
            <h2>今天的感受</h2>
            <p class="muted">不用写很多，留下一个真实的瞬间就好。</p>
          </div>
          <textarea id="diaryText" placeholder="今天我感觉……"></textarea>
          <button class="primary" id="saveDiary">保存今日感悟</button>
          <div class="encourage" id="encourage">写完后，这里会出现一句鼓励。</div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const storageKey = "echopal-simple-state";
    const defaultTasks = ["记录一个灵感", "整理一件小事", "写下今天的感受"];
    let state = loadState();

    function loadState() {
      const saved = localStorage.getItem(storageKey);
      if (saved) return JSON.parse(saved);
      return {
        streak: 0,
        checkedDate: "",
        tasks: defaultTasks.map((text, index) => ({ id: Date.now() + index, text, done: false })),
        diary: ""
      };
    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function todayKey() {
      return new Date().toISOString().slice(0, 10);
    }

    function render() {
      const checked = state.checkedDate === todayKey();
      document.querySelector("#streakCount").textContent = state.streak;
      document.querySelector("#streakText").textContent = checked ? "今天已经回来过了，明天继续。" : "今天还没有打卡。";
      document.querySelector("#checkButton").classList.toggle("done", checked);
      document.querySelector("#checkButton").classList.toggle("fading", checked);
      document.querySelector("#diaryText").value = state.diary || "";
      renderTasks(checked);
      saveState();
    }

    function renderTasks(show) {
      const tasksEl = document.querySelector("#tasks");
      tasksEl.innerHTML = "";
      state.tasks.forEach((task, index) => {
        const row = document.createElement("label");
        row.className = `task ${show ? "visible" : ""}`;
        row.style.transitionDelay = show ? `${index * 90}ms` : "0ms";
        row.innerHTML = `<input type="checkbox" ${task.done ? "checked" : ""}><span>${task.text}</span>`;
        row.querySelector("input").addEventListener("change", event => {
          if (event.target.checked) completeTask(row, task.id);
        });
        tasksEl.appendChild(row);
      });
    }

    function completeTask(row, id) {
      for (let i = 0; i < 26; i++) {
        const particle = document.createElement("span");
        particle.className = "particle";
        particle.style.setProperty("--x", `${Math.cos(i) * (50 + Math.random() * 80)}px`);
        particle.style.setProperty("--y", `${Math.sin(i * 1.7) * (30 + Math.random() * 70)}px`);
        particle.style.background = i % 3 === 0 ? "var(--rose)" : i % 3 === 1 ? "var(--gold)" : "var(--green-2)";
        row.appendChild(particle);
      }
      row.classList.add("shatter");
      setTimeout(() => {
        state.tasks = state.tasks.filter(task => task.id !== id);
        saveState();
        renderTasks(true);
      }, 560);
    }

    document.querySelector("#checkButton").addEventListener("click", () => {
      if (state.checkedDate === todayKey()) return;
      state.checkedDate = todayKey();
      state.streak += 1;
      saveState();
      render();
      setTimeout(() => document.querySelector("#checkButton").classList.add("fading"), 780);
      setTimeout(() => renderTasks(true), 940);
    });

    document.querySelector("#addTask").addEventListener("click", () => {
      const input = document.querySelector("#taskInput");
      const text = input.value.trim();
      if (!text) return;
      state.tasks.push({ id: Date.now(), text, done: false });
      input.value = "";
      saveState();
      renderTasks(state.checkedDate === todayKey());
    });

    document.querySelector("#saveDiary").addEventListener("click", () => {
      const text = document.querySelector("#diaryText").value.trim();
      state.diary = text;
      saveState();
      const encourage = document.querySelector("#encourage");
      encourage.textContent = text
        ? "你已经把今天好好接住了。明天再回来打卡，继续让这些小事发光。"
        : "哪怕只写一句也可以。今天先到这里，明天继续。";
      encourage.classList.add("show");
    });

    document.querySelector("#resetDemo").addEventListener("click", () => {
      localStorage.removeItem(storageKey);
      state = loadState();
      document.querySelector("#encourage").classList.remove("show");
      render();
    });

    render();
  </script>
</body>
</html>
